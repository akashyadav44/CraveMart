<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart – CraveMart</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <script src="js/cravemart.js" defer></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--brand:#C8401A;--brand-dark:#9E2E0E;--brand-light:#FAF0EC;--cream:#FFFBF7;--dark:#1C1208;--muted:#7A6A5A;--border:#EDE5DC;--success:#2D7A3A}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark)}
    .progress-bar{display:flex;align-items:center;justify-content:center;padding:1.8rem 2.5rem;border-bottom:1px solid var(--border);background:#fff}
    .step{display:flex;align-items:center;gap:8px}
    .step-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;border:2px solid var(--border);background:#fff;color:var(--muted)}
    .step-circle.active{background:var(--brand);border-color:var(--brand);color:#fff}
    .step-circle.done{background:var(--success);border-color:var(--success);color:#fff}
    .step-label{font-size:0.82rem;font-weight:500;color:var(--muted)}
    .step-label.active{color:var(--brand);font-weight:600}
    .step-line{width:80px;height:2px;background:var(--border);margin:0 .5rem}
    .step-line.done{background:var(--success)}
    .cart-layout{display:grid;grid-template-columns:1fr 380px;gap:2rem;padding:2.5rem;max-width:1100px;margin:0 auto}
    .cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .cart-title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700}
    .clear-btn{background:none;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;transition:color .2s}
    .clear-btn:hover{color:#C0392B}
    .cart-item{background:#fff;border:1px solid var(--border);border-radius:20px;padding:1.2rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:1.2rem;transition:all .22s}
    .cart-item:hover{box-shadow:0 4px 20px rgba(200,64,26,.08)}
    .item-emoji{width:72px;height:72px;border-radius:16px;flex-shrink:0;background:linear-gradient(135deg,#FAF0EC,#F5E0CC);display:flex;align-items:center;justify-content:center;font-size:2.5rem;cursor:pointer}
    .item-details{flex:1}
    .item-name{font-weight:600;font-size:1rem;margin-bottom:3px}
    .item-sub{font-size:0.78rem;color:var(--muted)}
    .item-right{display:flex;flex-direction:column;align-items:flex-end;gap:.75rem}
    .item-price{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700}
    .qty-ctrl{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:50px}
    .q-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .2s;border-radius:50%}
    .q-btn:hover{background:var(--brand-light);color:var(--brand)}
    .q-num{width:32px;text-align:center;font-weight:700;font-size:0.9rem}
    .del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:1.1rem;transition:color .2s;padding:4px}
    .del-btn:hover{color:#C0392B}
    .empty-cart{text-align:center;padding:5rem 2rem;background:#fff;border:1px solid var(--border);border-radius:24px}
    .empty-emoji{font-size:5rem;margin-bottom:1rem}
    .empty-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
    .empty-sub{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem}
    .btn-browse{display:inline-flex;align-items:center;gap:8px;background:var(--brand);color:#fff;border:none;border-radius:50px;padding:.85rem 2rem;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
    .btn-browse:hover{background:var(--brand-dark)}
    .coupon-box{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1rem 1.2rem;margin-top:1.5rem;display:flex;gap:.75rem}
    .coupon-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:.65rem 1rem;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--dark);background:var(--cream);outline:none;transition:border-color .2s}
    .coupon-input:focus{border-color:var(--brand)}
    .coupon-apply{background:var(--dark);color:#fff;border:none;border-radius:10px;padding:.65rem 1.2rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .2s}
    .coupon-apply:hover{background:var(--brand)}
    .coupon-ok{display:none;align-items:center;gap:6px;background:#E8F5E9;color:var(--success);border-radius:10px;padding:.65rem 1rem;font-size:.85rem;font-weight:600;margin-top:.5rem}
    .summary-card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:1.5rem;position:sticky;top:100px;height:fit-content}
    .summary-title{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;margin-bottom:1.5rem}
    .summary-row{display:flex;justify-content:space-between;align-items:center;font-size:.9rem;margin-bottom:.85rem}
    .summary-label{color:var(--muted)}
    .summary-val.green{color:var(--success);font-weight:600}
    .divider{border:none;border-top:1px solid var(--border);margin:1.2rem 0}
    .total-row{display:flex;justify-content:space-between;align-items:center}
    .total-label{font-weight:700;font-size:1rem}
    .total-val{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700}
    .btn-checkout{width:100%;background:var(--brand);color:#fff;border:none;border-radius:50px;padding:1rem;margin-top:1.5rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-checkout:hover{background:var(--brand-dark);transform:translateY(-1px)}
    .secure-badge{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:.85rem;font-size:.78rem;color:var(--muted)}
    .delivery-info{background:var(--brand-light);border-radius:14px;padding:.9rem 1.1rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:10px}
    .pay-methods{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem}
    .pay-chip{border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:.75rem;font-weight:500;color:var(--muted);background:#fff}
    @media(max-width:900px){.cart-layout{grid-template-columns:1fr;padding:1.5rem}.summary-card{position:static}}
  </style>
</head>
<body>
<div id="cm-navbar-root"></div>
<div class="progress-bar">
  <div class="step"><div class="step-circle active">1</div><span class="step-label active">Cart</span></div>
  <div class="step-line"></div>
  <div class="step"><div class="step-circle">2</div><span class="step-label">Checkout</span></div>
  <div class="step-line"></div>
  <div class="step"><div class="step-circle">3</div><span class="step-label">Payment</span></div>
  <div class="step-line"></div>
  <div class="step"><div class="step-circle">4</div><span class="step-label">Confirm</span></div>
</div>

<div class="cart-layout">
  <div>
    <div class="cart-header">
      <div class="cart-title">Your Cart <span id="itemCountLabel" style="font-size:1rem;font-weight:400;color:var(--muted)"></span></div>
      <button class="clear-btn" onclick="clearAll()"><i class="ti ti-trash" style="font-size:14px"></i> Clear all</button>
    </div>
    <div id="cartContent"></div>
    <div class="coupon-box" id="couponBox" style="display:none">
      <input class="coupon-input" id="couponInput" type="text" placeholder="Enter promo code (try CRAVE30)"/>
      <button class="coupon-apply" onclick="applyCoupon()">Apply</button>
    </div>
    <div id="couponOk" class="coupon-ok"><i class="ti ti-circle-check" style="font-size:16px"></i> CRAVE30 applied — 30% off!</div>
  </div>
  <div>
    <div class="summary-card">
      <div class="delivery-info"><span style="font-size:1.4rem">⚡</span><div><div style="font-weight:600;font-size:.82rem;color:var(--brand)">Estimated delivery: 28–35 mins</div><div style="font-size:.75rem;color:var(--muted)">Your order will arrive fresh & hot</div></div></div>
      <div class="summary-title">Order Summary</div>
      <div class="summary-row"><span class="summary-label">Subtotal</span><span id="sSubtotal">₹0</span></div>
      <div class="summary-row"><span class="summary-label">Delivery fee</span><span id="sDelivery">₹40</span></div>
      <div class="summary-row"><span class="summary-label">Tax (5%)</span><span id="sTax">₹0</span></div>
      <div class="summary-row" id="sDiscRow" style="display:none"><span class="summary-label">Promo (CRAVE30)</span><span class="summary-val green" id="sDiscount">−₹0</span></div>
      <div class="divider"></div>
      <div class="total-row"><span class="total-label">Total</span><span class="total-val" id="sTotal">₹0</span></div>
      <button class="btn-checkout" onclick="proceedCheckout()"><i class="ti ti-lock" style="font-size:16px"></i> Proceed to Checkout</button>
      <div class="secure-badge"><i class="ti ti-shield-check" style="font-size:14px"></i> Secure checkout · 256-bit SSL</div>
      <div class="divider"></div>
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:.5rem">Accepted payments</div>
      <div class="pay-methods"><span class="pay-chip">💳 Card</span><span class="pay-chip">📱 UPI</span><span class="pay-chip">🏦 Net Banking</span><span class="pay-chip">💰 COD</span></div>
    </div>
  </div>
</div>

<script>
  let couponApplied = false;

  document.addEventListener('DOMContentLoaded', () => {
    Navbar.render();
    renderCart();
  });

  function renderCart() {
    const items = Cart.get();
    const box = document.getElementById('couponBox');
    if (items.length === 0) {
      document.getElementById('cartContent').innerHTML = `
        <div class="empty-cart">
          <div class="empty-emoji">🛒</div>
          <div class="empty-title">Your cart is empty</div>
          <div class="empty-sub">Looks like you haven't added anything yet!</div>
          <a href="index.html" class="btn-browse"><i class="ti ti-bowl"></i> Browse Menu</a>
        </div>`;
      box.style.display = 'none';
      document.getElementById('itemCountLabel').textContent = '';
      updateSummary(items);
      return;
    }
    box.style.display = 'flex';
    document.getElementById('itemCountLabel').textContent = `(${items.length} item${items.length>1?'s':''})`;
    document.getElementById('cartContent').innerHTML = items.map((item,i) => `
      <div class="cart-item">
        <div class="item-emoji" onclick="window.location.href='product.html?id=${item.id}'">${item.emoji}</div>
        <div class="item-details">
          <div class="item-name">${item.name}</div>
          <div class="item-sub">${item.desc||''}</div>
        </div>
        <div class="item-right">
          <div class="item-price">₹${item.price * item.qty}</div>
          <div class="qty-ctrl">
            <button class="q-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span class="q-num">${item.qty}</span>
            <button class="q-btn" onclick="changeQty(${item.id},1)">+</button>
          </div>
          <button class="del-btn" onclick="removeItem(${item.id})"><i class="ti ti-trash" style="font-size:16px"></i></button>
        </div>
      </div>`).join('');
    updateSummary(items);
  }

  function changeQty(id, d) {
    const items = Cart.get();
    const item  = items.find(i => i.id === id);
    if (!item) return;
    item.qty = Math.max(1, item.qty + d);
    Cart.save(items);
    renderCart();
  }

  function removeItem(id) {
    Cart.remove(id);
    renderCart();
    Toast.show('🗑️ Item removed from cart');
  }

  function clearAll() {
    Cart.clear();
    renderCart();
    Toast.show('🧹 Cart cleared!');
  }

  function applyCoupon() {
    const code = document.getElementById('couponInput').value.trim().toUpperCase();
    if (code === 'CRAVE30') {
      couponApplied = true;
      document.getElementById('couponOk').style.display  = 'flex';
      document.getElementById('sDiscRow').style.display  = 'flex';
      updateSummary(Cart.get());
      Toast.show('🎉 CRAVE30 applied! 30% off!');
    } else {
      Toast.show(code ? '❌ Invalid code. Try CRAVE30' : '⚠️ Enter a promo code');
    }
  }

  function updateSummary(items) {
    const subtotal  = items.reduce((s,i) => s + i.price * i.qty, 0);
    const delivery  = items.length > 0 ? 40 : 0;
    const tax       = Math.round(subtotal * 0.05);
    const discount  = couponApplied ? Math.round(subtotal * 0.30) : 0;
    const total     = Math.max(0, subtotal + delivery + tax - discount);
    document.getElementById('sSubtotal').textContent  = '₹' + subtotal;
    document.getElementById('sDelivery').textContent  = delivery ? '₹' + delivery : 'FREE';
    document.getElementById('sTax').textContent       = '₹' + tax;
    document.getElementById('sDiscount').textContent  = '−₹' + discount;
    document.getElementById('sTotal').textContent     = '₹' + total;
  }

  function proceedCheckout() {
    if (Cart.get().length === 0) { Toast.show('🛒 Add items to cart first!'); return; }
    if (!Auth.isLoggedIn()) {
      localStorage.setItem('cm_redirect', 'checkout.html');
      window.location.href = 'login.html';
    } else {
      window.location.href = 'checkout.html';
    }
  }
</script>
</body>
</html>
